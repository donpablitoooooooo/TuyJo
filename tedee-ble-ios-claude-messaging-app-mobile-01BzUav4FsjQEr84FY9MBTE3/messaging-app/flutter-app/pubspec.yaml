name: private_messaging
description: App di messaggistica privata con crittografia E2E
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Networking & Real-time
  http: ^1.1.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Encryption
  pointycastle: ^3.9.1
  crypto: ^3.0.3
  encrypt: ^5.0.3
  asn1lib: ^1.5.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.5.0
  firebase_messaging: ^15.1.0

  # UI
  flutter_chat_ui: ^1.6.10
  intl: ^0.18.1
  uuid: ^4.2.2

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
