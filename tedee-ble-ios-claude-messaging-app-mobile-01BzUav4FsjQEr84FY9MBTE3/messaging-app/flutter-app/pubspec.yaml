name: private_messaging
description: App di messaggistica privata con crittografia E2E
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Networking & Real-time
  web_socket_channel: ^3.0.1
  http: ^1.1.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Encryption
  pointycastle: ^3.9.1
  crypto: ^3.0.3

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # UI
  flutter_chat_ui: ^1.6.10
  intl: ^0.18.1
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
