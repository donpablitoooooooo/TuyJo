name: private_messaging
description: TuyJo - Tu ed io in catalano - App di messaggistica privata con crittografia E2E
publish_to: 'none'
version: 1.31.0+39


environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.5+1

  # Networking
  http: ^1.6.0
  html: ^0.15.5

  # Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  sqflite: ^2.4.2
  path: ^1.9.1

  # Encryption
  pointycastle: ^3.9.1
  crypto: ^3.0.7
  encrypt: ^5.0.3
  asn1lib: ^1.6.5
  # AES-GCM nativo (hardware-accelerated su Android/iOS). ~50x più veloce
  # del pointycastle pure-Dart che avevamo usato via `encrypt`. Usato per
  # tutti i nuovi upload di allegati (i vecchi restano decifrabili via CBC).
  cryptography: ^2.7.0
  cryptography_flutter: ^2.3.2

  # Firebase (aggiornate alle ultime versioni)
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_messaging: ^16.1.0
  firebase_storage: ^13.0.5
  flutter_local_notifications: ^19.5.0

  # UI
  flutter_chat_ui: ^2.11.1
  intl: ^0.20.2
  uuid: ^4.5.2
  timezone: ^0.10.1
  flutter_linkify: ^6.0.0
  url_launcher: ^6.3.2
  table_calendar: ^3.1.2

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.4

  # File Picking & Media
  image_picker: ^1.2.1
  image_cropper: ^11.0.0
  file_picker: ^10.3.10
  mime: ^2.0.0
  path_provider: ^2.1.5
  image: ^4.7.2
  flutter_image_compress: ^2.3.0
  open_filex: ^4.7.0
  pdfx: ^2.9.2
  receive_sharing_intent: ^1.8.1
  share_plus: ^12.0.1
  flutter_staggered_grid_view: ^0.7.0
  package_info_plus: ^8.0.0

  # Voice Call (CallKit iOS + ConnectionService Android)
  flutter_callkit_incoming: ^3.0.0
  flutter_webrtc: ^1.3.0

  # Location & Sensors
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  flutter_compass: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logo_white.png
    - assets/logo_teal.png
    - assets/logo_grey.png
