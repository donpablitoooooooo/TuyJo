name: private_messaging
description: App di messaggistica privata con crittografia E2E
publish_to: 'none'
version: 1.7.0+8


environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.5

  # Networking
  http: ^1.2.2

  # Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  sqflite: ^2.3.0
  path: ^1.9.0

  # Encryption
  pointycastle: ^3.9.1
  crypto: ^3.0.3
  encrypt: ^5.0.3
  asn1lib: ^1.5.0

  # Firebase (aggiornate alle ultime versioni)
  firebase_core: ^4.4.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.3.0
  firebase_storage: ^13.3.0
  flutter_local_notifications: ^19.0.1

  # UI
  flutter_chat_ui: ^2.11.1
  intl: ^0.20.2
  uuid: ^4.2.2
  timezone: ^0.10.1
  flutter_linkify: ^6.0.0
  url_launcher: ^6.3.1

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.4

  # File Picking & Media
  image_picker: ^1.2.0
  image_cropper: ^9.0.0
  file_picker: ^8.2.0
  mime: ^2.0.0
  path_provider: ^2.1.6
  image: ^4.3.0
  open_filex: ^4.6.0
  pdfx: ^2.8.0
  receive_sharing_intent: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
