  <rect x="3" y="3" width="744" height="244" rx="18" ry="18" fill="none" stroke="#a6a6a6" stroke-width="2"/>

  <!-- Google Play Triangle Icon -->
  <g transform="translate(45, 45)">
    <path d="M0 10 L0 150 L75 80Z" fill="#4285F4"/>
